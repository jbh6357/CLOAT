<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>CLOAT, 이미지 클로킹 서비스</title>
	<link rel="stylesheet" href="css/style.css">
	<script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
</head>

<body id="cloat">
	<div id="header"></div>
	<!-- header 끝 -->

	<!-- 여기부터 가져가세요 --> 
	<section class="content board view list">
		<div class="page_top">
			<div class="inner">
				<h2 id="pageName">게시판 이름</h2>
			</div>
		</div>			
		<div class="inner">
			<div class="view_wrap">
				<div class="view_top">
					<h3 class="view_title">제목이 출력됩니다.</h3>
					<div class="view_info">
						<div class="view_info_lt">
							<p><span>작성자</span>suyeonh</p>
							<p><span>조회수</span>5</p>
						</div>
						<div class="view_info_rt">
							<p><span>작성날짜</span>2025.05.19 19:17:00</p>
						</div>
					</div>
				</div>
				<div class="view_btm">
					글 내용이 출력됩니다
					<!-- 첨부파일이 있다면 -->
					<div class="view_file">
						<a href="" download>첨부한파일이름.zip</a>
					</div>
				</div>	
			</div>				
			<div class="btn_wrap">
				<!-- 해당 글 작성자 / admin 만 보임 -->
				<button onClick="" class="btn">수정</button>
				<button onClick="" class="btn">삭제</button>
				<!-- 해당 글 작성자 / admin 만 보임 -->
				<button onClick="javascript:history.back()" class="btn ipt_sbm">목록</button>
			</div>				
		</div>	
	</section>
	<!-- 여기까지 가져가세요 -->

	<!-- footer-->
	<div id="footer"></div>

	<script>
		function loadHTML(id, url) {
			fetch(url)
				.then(res => res.text())
				.then(data => {
					document.getElementById(id).innerHTML = data;
				});
		}

		loadHTML("header", "header.html");
		loadHTML("footer", "footer.html");
	</script>
</body>

</html>
